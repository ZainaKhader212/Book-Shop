 <body>
     
     <header class="nabvar">
         <div class="top">
             <a href="interface.html">Home</a>
             <a href="menuBook.html">All Products</a>
         </div>
         <div class="icon">
             <button>👤</button>
             <a href="cart.html">
                 <button>🛒</button>
             </a>
             <button>💟</button>
         </div>
     </header>
    

     <div class="container">
         <div class="image">
             <img id="productImg" />
         </div>
         <div class="left-content">
             <div> <h1 id="productName"></h1></div>
             <div class="price">   <p id="productPrc"></p></div>
             <div class="quantity">
                 <button  class="qty-btn"onclick="changeQuantity(-1)" type="button">-</button>
                 <input type="number" id="quantity" value="1"min="1"  />
                 <button class="qty-btn" onclick="changeQuantity(1)" type="button">+</button>
             </div>
             <button id="addtocart" onclick="calculatePrice()">Add to cart</button>
         </div>
     </div>


     <script>


         const qty = document.getElementById("quantity");
         let count = parseInt(qty.value) || 1;

         function changeQuantity(amount) {
             count += amount;
             if (count < 1)
                 count = 1;
             qty.value = count;
         }
         const urlProd = new URLSearchParams(window.location.search);
         const image = urlProd.get('img');
         const price = urlProd.get('price');
         const title = urlProd.get('title');
         if (image)
             document.getElementById("productImg").src = image;
         if (price)
             document.getElementById("productPrc").innerText = price;
         if (title)
             document.getElementById("productName").innerText = title;

         function calculatePrice() {
             const currentCnt = parseInt(qty.value) || 1;
             const priceFloat = parseFloat(price.replace(/[^0-9.]/g, ''));
             if (!isNaN(priceFloat)) {
                 const total = priceFloat * currentCnt;
                 console.log(`Total Price ${total}`);
             }
             }
     </script>
 </body>
